services:
  app:
    build: .
    container_name: openclaw-studio
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3500
      - HOST=127.0.0.1
      - STUDIO_ACCESS_TOKEN=${STUDIO_ACCESS_TOKEN}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-ws://127.0.0.1:18789}
    volumes:
      - studio-data:/home/studio/.openclaw

  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - studio-net
    depends_on:
      - app

  certbot:
    image: certbot/certbot:latest
    container_name: openclaw-certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    depends_on:
      - nginx

volumes:
  studio-data:

networks:
  studio-net:
    driver: bridge
