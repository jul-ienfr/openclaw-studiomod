<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Manager v3</title>
    <script type="module" crossorigin src="/ai-manager/admin/assets/index-BT6RRoPr.js"></script>
    <link rel="stylesheet" crossorigin href="/ai-manager/admin/assets/index-9xjNF1Jr.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('app').innerHTML =
          '<pre style="color:#ef4444;padding:24px;font-size:14px;white-space:pre-wrap;">ERROR: ' +
          msg + '\n\nSource: ' + src + ':' + line + ':' + col +
          (err && err.stack ? '\n\nStack:\n' + err.stack : '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('app').innerHTML =
          '<pre style="color:#ef4444;padding:24px;font-size:14px;white-space:pre-wrap;">UNHANDLED PROMISE:\n' +
          (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre>';
      });
    </script>
  </body>
</html>
