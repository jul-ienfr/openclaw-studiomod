<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>OpenClaw Studio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- Pairing screen -->
    <div id="screen-pairing" class="screen">
      <div class="pairing-container">
        <div class="header">
          <h1>OpenClaw Studio</h1>
          <p class="subtitle">Connect to your Studio server</p>
        </div>

        <button id="btn-scan" class="btn btn-primary btn-large">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M3 3h6v6H3z M15 3h6v6h-6z M3 15h6v6H3z M15 15h2 M19 15v2 M15 19h4 M19 19v2"/>
          </svg>
          Scan QR Code
        </button>

        <div class="divider">or enter manually</div>

        <form id="form-manual" class="form">
          <div class="form-group">
            <label for="input-url">Server URL</label>
            <input id="input-url" type="url" placeholder="http://192.168.1.x:3000" autocomplete="url" inputmode="url" />
          </div>
          <div class="form-group">
            <label for="input-token">Access Token</label>
            <input id="input-token" type="text" placeholder="paste token here" autocomplete="off" />
          </div>
          <button type="submit" id="btn-connect" class="btn btn-primary">Connect</button>
          <p id="form-error" class="error hidden"></p>
        </form>

        <div id="saved-servers" class="saved-servers hidden">
          <h3>Recent servers</h3>
          <ul id="servers-list"></ul>
        </div>
      </div>
    </div>

    <!-- Studio screen: embedded iframe + floating disconnect bar -->
    <div id="screen-studio" class="screen hidden">
      <iframe id="studio-frame" class="studio-frame" allow="camera;microphone"></iframe>
      <button id="btn-disconnect" class="fab-disconnect" title="Disconnect">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <div id="status-bar" class="status-bar">
        <span id="status-text">Connecting...</span>
      </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/scanner.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
